data:
  data_path: "/mnt/nvme_raid0/experiment_data/day/day_all_a_raw_from_tick_20210223_20230529.parquet"
  day_path: "/mnt/nvme_raid0/experiment_data/day/day_all_a_raw_from_tick_20210223_20230529.parquet"
  tick_path: "/mnt/nvme_raid0/experiment_data/tick/stock_tick_month"
  l2_order_path: "/mnt/nvme_raid0/experiment_data/l2/order"
  min_path: "/mnt/nvme_raid0/experiment_data/min/1m_hfq"
  adj_factor_path: "/mnt/nvme_raid0/experiment_data/adj_factor"
  missing_report_path: "/mnt/nvme_raid0/experiment_data/logs/missing_data_full_l2baseline_core.csv"
  train_start_date: "2021-06-01"
  train_end_date: "2022-12-30"
  test_start_date: "2023-01-03"
  test_end_date: "2023-05-29"
  limit_up_threshold: 0.095
  time_window_before_limit: 300
  event_window_minutes: 5
  min_volume_threshold: 100000
  tushare_token: "d83605429b7463a375ed3b36271d1b2ff7b7bd937920eb8a30fcd690"
  enable_remote_adj_factor_fallback: false

feature:
  price_features:
    - return_rate
    - return_speed
    - volatility
    - price_position
  volume_features:
    - volume_ratio
    - volume_surge
  orderbook_features:
    - bid_ask_ratio
    - order_imbalance
    - depth_ratio
  flow_features:
    - active_buy_ratio
    - net_inflow
  technical_features: []
  feature_params:
    ma_windows:
      - 5
      - 10
      - 20
    rsi_period: 14
    volume_ma_window: 20

model:
  model_name: "lasso"
  model_params: {}
  cv_folds: 5
  random_state: 42
  use_standardization: true

train:
  validation_ratio: 0.2
  early_stopping_rounds: 50
  metric: "mse"
  save_model: true
  model_save_path: "saved_models/"
  rolling_train_days: 5

eval:
  metrics:
    - mse
    - mae
    - r2
    - ic
    - rank_ic
  feature_importance_method: "permutation"
  plot_results: false
  save_results: true
  results_save_path: "results/"
