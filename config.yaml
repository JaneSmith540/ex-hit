data:
  data_path: "D:/数据样例/day/2025"
  day_path: "D:/数据样例/day/2025"
  tick_path: "D:/数据样例/tick"
  l2_order_path: "D:/数据样例/l2_order/2025"
  min_path: "D:/数据样例/min_前复权/2025_1min"
  adj_factor_path: "D:/数据样例"
  train_start_date: "2025-01-01"
  train_end_date: "2025-01-31"
  test_start_date: "2025-02-01"
  test_end_date: "2025-02-28"
  limit_up_threshold: 0.095
  time_window_before_limit: 300
  event_window_minutes: 5
  min_volume_threshold: 100000
  tushare_token: "d83605429b7463a375ed3b36271d1b2ff7b7bd937920eb8a30fcd690"
  enable_remote_adj_factor_fallback: false

feature:
  price_features:
    - return_rate
    - return_speed
    - volatility
    - price_position
  volume_features:
    - volume_ratio
    - volume_surge
    - turnover_rate
  orderbook_features:
    - bid_ask_ratio
    - order_imbalance
    - depth_ratio
  flow_features:
    - active_buy_ratio
    - large_order_ratio
    - net_inflow
  technical_features:
    - ma_slope
    - rsi_short
    - momentum
  feature_params:
    ma_windows:
      - 5
      - 10
      - 20
    rsi_period: 14
    volume_ma_window: 20

model:
  model_name: "lasso"
  model_params: {}
  cv_folds: 5
  random_state: 42
  use_standardization: true

train:
  validation_ratio: 0.2
  early_stopping_rounds: 50
  metric: "mse"
  save_model: true
  model_save_path: "saved_models/"
  rolling_train_days: 5

eval:
  metrics:
    - mse
    - mae
    - r2
    - ic
    - rank_ic
  feature_importance_method: "permutation"
  plot_results: true
  save_results: true
  results_save_path: "results/"
